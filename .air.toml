# Configuration air pour le hot reload du payment-service (Go/Fiber)
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Commande de compilation
  cmd = "go build -o ./tmp/payment-service ./cmd/api/main.go"
  # Binaire à exécuter après compilation
  bin = "./tmp/payment-service"
  # Extensions surveillées
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Dossiers ignorés
  exclude_dir = ["assets", "tmp", "vendor", ".git"]
  # Délai avant recompilation (ms)
  delay = 1000
  # Arrêter l'ancien processus avant d'en lancer un nouveau
  kill_delay = "0s"
  # Afficher les logs du process
  send_interrupt = false
  stop_on_error = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[log]
  time = false

[misc]
  clean_on_exit = true
